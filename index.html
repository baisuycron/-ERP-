<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新零售ERP - 商品资料管理</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">ERP</div>
        <div>
          <div class="brand-title">新零售ERP</div>
          <div class="brand-subtitle">商品资料中心</div>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-item" href="#">首页</a>
        <a class="nav-item active" href="#">商品资料管理</a>
        <a class="nav-item" href="#">库存中心</a>
        <a class="nav-item" href="#">采购管理</a>
        <a class="nav-item" href="#">门店运营</a>
        <a class="nav-item" href="#">系统设置</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>商品资料管理</h1>
          <p>支持商品、SKU、单位换算、条码、品牌分类等主数据的增删改查</p>
        </div>
        <div class="header-actions">
          <button class="btn btn-secondary" id="downloadTemplateBtn">下载导入模板</button>
          <button class="btn btn-secondary" id="importBtn">导入商品</button>
          <button class="btn btn-primary" id="createBtn">新建商品</button>
          <input id="importInput" type="file" accept=".json" hidden>
        </div>
      </header>

      <section class="card summary-grid" id="summaryCards"></section>

      <section class="card">
        <div class="section-title-row">
          <h2>查询条件</h2>
          <div class="toolbar-actions">
            <button class="btn btn-light" id="resetFiltersBtn">重置</button>
            <button class="btn btn-primary" id="searchBtn">查询</button>
          </div>
        </div>
        <div class="filter-grid">
          <label class="field"><span>商品编码</span><input id="filterCode" type="text" placeholder="请输入商品编码"></label>
          <label class="field"><span>商品名称</span><input id="filterName" type="text" placeholder="请输入商品名称"></label>
          <label class="field"><span>助记码</span><input id="filterMnemonic" type="text" placeholder="请输入助记码"></label>
          <label class="field"><span>条码</span><input id="filterBarcode" type="text" placeholder="请输入条码"></label>
          <label class="field"><span>品牌</span><select id="filterBrand"></select></label>
          <label class="field"><span>一级分类</span><select id="filterCategory1"></select></label>
          <label class="field"><span>二级分类</span><select id="filterCategory2"></select></label>
          <label class="field"><span>三级分类</span><select id="filterCategory3"></select></label>
          <label class="field">
            <span>商品状态</span>
            <select id="filterStatus">
              <option value="">全部</option>
              <option value="已启用">已启用</option>
              <option value="已停用">已停用</option>
              <option value="草稿">草稿</option>
              <option value="已删除">已删除</option>
            </select>
          </label>
          <label class="field"><span>创建人</span><input id="filterCreator" type="text" placeholder="请输入创建人"></label>
          <label class="field">
            <span>批次管理</span>
            <select id="filterBatch">
              <option value="">全部</option>
              <option value="true">是</option>
              <option value="false">否</option>
            </select>
          </label>
          <label class="field">
            <span>序列号管理</span>
            <select id="filterSerial">
              <option value="">全部</option>
              <option value="true">是</option>
              <option value="false">否</option>
            </select>
          </label>
        </div>
      </section>

      <section class="card">
        <div class="section-title-row">
          <h2>商品列表</h2>
          <div class="toolbar-actions">
            <button class="btn btn-light" id="exportSelectedBtn">导出勾选项</button>
            <button class="btn btn-light" id="exportCurrentBtn">导出当前结果</button>
            <button class="btn btn-light" id="exportAllBtn">导出全部</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th><input id="checkAll" type="checkbox"></th>
                <th>商品编码</th>
                <th>商品名称</th>
                <th>品牌</th>
                <th>三级分类</th>
                <th>主单位</th>
                <th>SKU数</th>
                <th>条码数</th>
                <th>状态</th>
                <th>创建人</th>
                <th>更新时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="drawer hidden" id="productDrawer">
    <div class="drawer-mask" data-close-drawer></div>
    <div class="drawer-panel">
      <div class="drawer-header">
        <div>
          <h2 id="drawerTitle">新建商品</h2>
          <p id="drawerSubtitle">按 PRD 规则维护商品、SKU、单位和条码信息</p>
        </div>
        <button class="icon-btn" data-close-drawer>×</button>
      </div>
      <form id="productForm" class="drawer-body">
        <input id="productId" type="hidden">
        <section class="form-section">
          <div class="section-headline"><h3>基础信息</h3><span>SPU主档</span></div>
          <div class="form-grid">
            <label class="field"><span>商品编码 *</span><input id="code" type="text" maxlength="50" placeholder="支持系统生成或手工修改"></label>
            <label class="field"><span>商品名称 *</span><input id="name" type="text" maxlength="200" placeholder="请输入商品名称"></label>
            <label class="field"><span>助记码</span><input id="mnemonic" type="text" maxlength="100" placeholder="拼音首字母/简码"></label>
            <label class="field"><span>品牌 *</span><select id="brand"></select></label>
            <label class="field"><span>一级分类 *</span><select id="category1"></select></label>
            <label class="field"><span>二级分类 *</span><select id="category2"></select></label>
            <label class="field"><span>三级分类 *</span><select id="category3"></select></label>
            <label class="field"><span>税率(%)</span><input id="taxRate" type="number" min="0" max="100" step="0.01" value="0"></label>
            <label class="field"><span>是否称重商品</span><select id="isWeighted"><option value="false">否</option><option value="true">是</option></select></label>
            <label class="field"><span>批次管理</span><select id="isBatchManaged"><option value="false">否</option><option value="true">是</option></select></label>
            <label class="field"><span>保质期(天)</span><input id="shelfLifeDays" type="number" min="0" step="1" placeholder="批次管理为是时填写"></label>
            <label class="field"><span>序列号管理</span><select id="isSerialManaged"><option value="false">否</option><option value="true">是</option></select></label>
            <label class="field"><span>默认供应商</span><select id="defaultSupplier"></select></label>
            <label class="field"><span>可选供应商</span><select id="optionalSuppliers" multiple></select></label>
          </div>
        </section>

        <section class="form-section">
          <div class="section-headline"><h3>单位与价格</h3><span>主单位与换算体系</span></div>
          <div class="form-grid">
            <label class="field"><span>主单位 *</span><select id="mainUnit"></select></label>
            <label class="field"><span>采购单位</span><select id="purchaseUnit"></select></label>
            <label class="field"><span>销售单位</span><select id="salesUnit"></select></label>
            <label class="field"><span>配送单位</span><select id="deliveryUnit"></select></label>
            <label class="field"><span>门店售价</span><input id="retailPrice" type="number" min="0" step="0.0001" value="0"></label>
            <label class="field"><span>会员价</span><input id="memberPrice" type="number" min="0" step="0.0001" value="0"></label>
            <label class="field"><span>采购价</span><input id="purchasePrice" type="number" min="0" step="0.0001" value="0"></label>
            <label class="field"><span>成本价</span><input id="costPrice" type="number" min="0" step="0.0001" value="0"></label>
          </div>
          <div class="inline-toolbar"><h4>单位换算关系</h4><button class="btn btn-light" type="button" id="addConversionBtn">新增换算</button></div>
          <div id="conversionList" class="repeat-list"></div>
        </section>

        <section class="form-section">
          <div class="section-headline"><h3>SKU与条码</h3><span>导入导出颗粒度=SKU</span></div>
          <div class="inline-toolbar"><h4>SKU列表</h4><button class="btn btn-light" type="button" id="addSkuBtn">新增SKU</button></div>
          <div id="skuList" class="repeat-list"></div>
        </section>
      </form>
      <div class="drawer-footer">
        <button class="btn btn-light" type="button" data-close-drawer>取消</button>
        <button class="btn btn-primary" type="button" id="saveBtn">保存商品</button>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="detailModal">
    <div class="modal-mask" data-close-detail></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h2>商品详情</h2>
        <button class="icon-btn" data-close-detail>×</button>
      </div>
      <div class="modal-body" id="detailContent"></div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>
  <script src="./script.js"></script>
</body>
</html>
